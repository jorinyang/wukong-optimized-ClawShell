# ClawShell v1.0 测试配置

test:
  # 单元测试配置
  unit:
    enabled: true
    pattern: "test_*.py"
    coverage: true
    min_coverage: 80

  # 集成测试配置
  integration:
    enabled: true
    hosts:
      - localhost:5678  # N8N
      - localhost:3000   # Obsidian

  # 端到端测试配置
  e2e:
    enabled: false
    browser: chromium
    headless: true

  # Mock配置
  mock:
    memos_api: true
    obsidian_api: false
    n8n_api: true
